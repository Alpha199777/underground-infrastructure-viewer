<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Underground Infrastructure Viewer</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #title-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            z-index: 1;
            font-size: 14px;
            font-weight: bold;
        }
        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 1;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-color {
            width: 20px;
            height: 4px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        #controls {
            position: absolute;
            top: 50px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 1;
            font-size: 12px;
        }
        #controls strong {
            display: block;
            margin-bottom: 6px;
        }
        .control-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            cursor: pointer;
        }
        .control-item input {
            margin-right: 8px;
            cursor: pointer;
        }
        .maplibregl-popup-content {
            background: #1a1a2e;
            color: white;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            min-width: 200px;
        }
        .maplibregl-popup-tip {
            border-top-color: #1a1a2e !important;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            color: #00aaff;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }
        .popup-label { color: #aaaaaa; }
        .popup-value { color: #ffffff; font-weight: bold; }
        .status-active { color: #00ff88; }
        .status-maintenance { color: #ffdd00; }
    </style>
</head>
<body>
    <div id='title-bar'>Underground Infrastructure Viewer - Geneva</div>

    <div id='legend'>
        <strong>Infrastructure</strong>
        <div class='legend-item'><div class='legend-color' style='background:#00aaff'></div>Water Pipe</div>
        <div class='legend-item'><div class='legend-color' style='background:#ffdd00'></div>Electrical Cable</div>
        <div class='legend-item'><div class='legend-color' style='background:#ff6600'></div>Telecom</div>
        <div class='legend-item'><div class='legend-color' style='background:#8B4513'></div>Sewer</div>
        <div class='legend-item'><div class='legend-dot' style='background:#00ff88'></div>Junction Box</div>
    </div>

    <div id='controls'>
        <strong>Layer Controls</strong>
        <div class='control-item'>
            <input type='checkbox' id='toggle-water' checked>
            <label for='toggle-water'>Water Pipe</label>
        </div>
        <div class='control-item'>
            <input type='checkbox' id='toggle-electrical' checked>
            <label for='toggle-electrical'>Electrical Cable</label>
        </div>
        <div class='control-item'>
            <input type='checkbox' id='toggle-telecom' checked>
            <label for='toggle-telecom'>Telecom</label>
        </div>
        <div class='control-item'>
            <input type='checkbox' id='toggle-sewer' checked>
            <label for='toggle-sewer'>Sewer</label>
        </div>
        <div class='control-item'>
            <input type='checkbox' id='toggle-junction' checked>
            <label for='toggle-junction'>Junction Box</label>
        </div>
    </div>

    <div id='map'></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [6.1432, 46.2044],
            zoom: 13
        });

        map.addControl(new maplibregl.NavigationControl());
        map.addControl(new maplibregl.ScaleControl());

        function buildPopupHTML(props) {
            const statusClass = props.status === 'active' ? 'status-active' : 'status-maintenance';
            return `
                <div class='popup-title'>${props.label}</div>
                <div class='popup-row'>
                    <span class='popup-label'>Type</span>
                    <span class='popup-value'>${props.type}</span>
                </div>
                <div class='popup-row'>
                    <span class='popup-label'>Material</span>
                    <span class='popup-value'>${props.material || 'N/A'}</span>
                </div>
                <div class='popup-row'>
                    <span class='popup-label'>Depth</span>
                    <span class='popup-value'>${props.depth_m}m</span>
                </div>
                <div class='popup-row'>
                    <span class='popup-label'>Installed</span>
                    <span class='popup-value'>${props.install_year}</span>
                </div>
                <div class='popup-row'>
                    <span class='popup-label'>Status</span>
                    <span class='popup-value ${statusClass}'>${props.status}</span>
                </div>
            `;
        }

        map.on('load', async () => {
            const response = await fetch('https://underground-infra-api-production.up.railway.app/api/infrastructure');
            const data = await response.json();

            map.addSource('infrastructure', {
                type: 'geojson',
                data: data
            });

            // LINE layer
            map.addLayer({
                id: 'infrastructure-lines',
                type: 'line',
                source: 'infrastructure',
                filter: ['!=', ['get', 'type'], 'junction_box'],
                paint: {
                    'line-color': [
                        'match', ['get', 'type'],
                        'water_pipe',       '#00aaff',
                        'electrical_cable', '#ffdd00',
                        'telecom',          '#ff6600',
                        'sewer',            '#8B4513',
                        '#ffffff'
                    ],
                    'line-width': 3,
                    'line-opacity': 0.9
                }
            });

            // POINT layer
            map.addLayer({
                id: 'infrastructure-points',
                type: 'circle',
                source: 'infrastructure',
                filter: ['==', ['get', 'type'], 'junction_box'],
                paint: {
                    'circle-color': '#00ff88',
                    'circle-radius': 8,
                    'circle-stroke-color': '#ffffff',
                    'circle-stroke-width': 2
                }
            });

            // CLICK - lines
            map.on('click', 'infrastructure-lines', (e) => {
                const props = e.features[0].properties;
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(buildPopupHTML(props))
                    .addTo(map);
            });

            // CLICK - points
            map.on('click', 'infrastructure-points', (e) => {
                const props = e.features[0].properties;
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(buildPopupHTML(props))
                    .addTo(map);
            });

            // Cursor hover
            ['infrastructure-lines', 'infrastructure-points'].forEach(layer => {
                map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
                map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
            });

            // Layer toggle controls
            const toggles = {
                'toggle-water':      { layer: 'infrastructure-lines', type: 'water_pipe' },
                'toggle-electrical': { layer: 'infrastructure-lines', type: 'electrical_cable' },
                'toggle-telecom':    { layer: 'infrastructure-lines', type: 'telecom' },
                'toggle-sewer':      { layer: 'infrastructure-lines', type: 'sewer' },
                'toggle-junction':   { layer: 'infrastructure-points', type: 'junction_box' }
            };

            // Track visible types
            const visibleTypes = new Set([
                'water_pipe', 'electrical_cable', 'telecom', 'sewer', 'junction_box'
            ]);

            Object.entries(toggles).forEach(([id, config]) => {
                document.getElementById(id).addEventListener('change', (e) => {
                    if (e.target.checked) {
                        visibleTypes.add(config.type);
                    } else {
                        visibleTypes.delete(config.type);
                    }

                    // Update line filter
                    const lineTypes = [...visibleTypes].filter(t => t !== 'junction_box');
                    map.setFilter('infrastructure-lines',
                        lineTypes.length > 0
                            ? ['in', ['get', 'type'], ['literal', lineTypes]]
                            : ['==', ['get', 'type'], '']
                    );

                    // Update point filter
                    map.setFilter('infrastructure-points',
                        visibleTypes.has('junction_box')
                            ? ['==', ['get', 'type'], 'junction_box']
                            : ['==', ['get', 'type'], '']
                    );
                });
            });
        });
    </script>
</body>
</html>
