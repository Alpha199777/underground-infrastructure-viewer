<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Underground Infrastructure Viewer</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #title-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            z-index: 1;
            font-size: 14px;
            font-weight: bold;
        }
        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 1;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-color {
            width: 20px;
            height: 4px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id='title-bar'>Underground Infrastructure Viewer - Geneva</div>
    <div id='legend'>
        <strong>Infrastructure</strong>
        <div class='legend-item'><div class='legend-color' style='background:#00aaff'></div>Water Pipe</div>
        <div class='legend-item'><div class='legend-color' style='background:#ffdd00'></div>Electrical Cable</div>
        <div class='legend-item'><div class='legend-color' style='background:#ff6600'></div>Telecom</div>
        <div class='legend-item'><div class='legend-color' style='background:#8B4513'></div>Sewer</div>
        <div class='legend-item'><div class='legend-dot' style='background:#00ff88'></div>Junction Box</div>
    </div>
    <div id='map'></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [6.1432, 46.2044],
            zoom: 13
        });

        map.addControl(new maplibregl.NavigationControl());
        map.addControl(new maplibregl.ScaleControl());

        // Color mapping per infrastructure type
        const typeColors = {
            'water_pipe':       '#00aaff',
            'electrical_cable': '#ffdd00',
            'telecom':          '#ff6600',
            'sewer':            '#8B4513',
            'junction_box':     '#00ff88'
        };

        map.on('load', async () => {
            // Fetch GeoJSON from FastAPI
            const response = await fetch('http://127.0.0.1:8000/api/infrastructure');
            const data = await response.json();

            // Add data source
            map.addSource('infrastructure', {
                type: 'geojson',
                data: data
            });

            // LINE layer for pipes/cables
            map.addLayer({
                id: 'infrastructure-lines',
                type: 'line',
                source: 'infrastructure',
                filter: ['!=', ['get', 'type'], 'junction_box'],
                paint: {
                    'line-color': [
                        'match', ['get', 'type'],
                        'water_pipe',       '#00aaff',
                        'electrical_cable', '#ffdd00',
                        'telecom',          '#ff6600',
                        'sewer',            '#8B4513',
                        '#ffffff'
                    ],
                    'line-width': 3,
                    'line-opacity': 0.9
                }
            });

            // POINT layer for junction boxes
            map.addLayer({
                id: 'infrastructure-points',
                type: 'circle',
                source: 'infrastructure',
                filter: ['==', ['get', 'type'], 'junction_box'],
                paint: {
                    'circle-color': '#00ff88',
                    'circle-radius': 8,
                    'circle-stroke-color': '#ffffff',
                    'circle-stroke-width': 2
                }
            });

            // CLICK interaction - lines
            map.on('click', 'infrastructure-lines', (e) => {
                const props = e.features[0].properties;
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <strong>${props.label}</strong><br>
                        Type: ${props.type}<br>
                        Material: ${props.material}<br>
                        Depth: ${props.depth_m}m<br>
                        Installed: ${props.install_year}<br>
                        Status: ${props.status}
                    `)
                    .addTo(map);
            });

            // CLICK interaction - points
            map.on('click', 'infrastructure-points', (e) => {
                const props = e.features[0].properties;
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <strong>${props.label}</strong><br>
                        Type: ${props.type}<br>
                        Depth: ${props.depth_m}m<br>
                        Installed: ${props.install_year}<br>
                        Status: ${props.status}
                    `)
                    .addTo(map);
            });

            // Cursor change on hover
            map.on('mouseenter', 'infrastructure-lines', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'infrastructure-lines', () => {
                map.getCanvas().style.cursor = '';
            });
            map.on('mouseenter', 'infrastructure-points', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'infrastructure-points', () => {
                map.getCanvas().style.cursor = '';
            });
        });
    </script>
</body>
</html>
